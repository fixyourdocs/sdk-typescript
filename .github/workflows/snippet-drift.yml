name: snippet-drift

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "13 6 * * *"  # daily, so an upstream-only edit also turns this red.

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compare vendored snippet to upstream
        run: python3 .github/scripts/check-snippet-drift.py
